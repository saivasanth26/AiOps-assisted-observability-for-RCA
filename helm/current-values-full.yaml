      - name: FLAGD_METRICS_EXPORTER
        value: otel
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: FLAGD_UI_PORT
        value: "4000"
      - name: SECRET_KEY_BASE
        value: yYrECL4qbNwleYInGJYvVnSkwJuSQJ4ijPTx5tirGUXrbznFIBFVJdPl5t6O9ASw
      - name: PHX_HOST
        value: localhost
      name: flagd-ui
      resources:
        limits:
          memory: 250Mi
      service:
        port: 4000
      useDefault:
        env: true
      volumeMounts:
      - mountPath: /app/data
        name: config-rw
    useDefault:
      env: true
