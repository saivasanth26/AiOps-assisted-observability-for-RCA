    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://$(OTEL_COLLECTOR_NAME):4318
    - name: OTEL_LOGS_EXPORTER
      value: otlp
    podAnnotations:
      resource.opentelemetry.io/service.namespace: otel-demo
    resources:
      limits:
        memory: 300Mi
    service:
      port: 8080
    useDefault:
      env: true
