  flagd:
    additionalVolumes:
    - configMap:
        name: flagd-config
      name: config-ro
    command:
    - /flagd-build
    - start
    - --port
    - "8013"
    - --ofrep-port
    - "8016"
    - --uri
    - file:./etc/flagd/demo.flagd.json
