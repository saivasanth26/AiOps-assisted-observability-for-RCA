      value: "false"
    initContainers:
    - command:
      - sh
      - -c
      - until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;
      image: busybox:latest
      name: wait-for-kafka
    podAnnotations:
      resource.opentelemetry.io/service.namespace: otel-demo
    resources:
      limits:
        memory: 120Mi
    useDefault:
      env: true
  ad:
    enabled: true
    env:
